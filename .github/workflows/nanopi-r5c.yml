name: NanoPi-R5C ImmortalWrt Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 3,6'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare Feeds
        run: |
          cp .github/workflows/feeds-nanopi-r5c.conf .github/workflows/feeds.conf.default

      - name: Check disk space
        run: df -h

      - name: Update Feeds
        run: |
          ./scripts/feeds update -a

      - name: Install Feeds
        run: |
          ./scripts/feeds install -a

      - name: Build ImmortalWrt
        run: |
          make -j$(nproc) V=s BOARD=rockchip TARGET_rockchip/armv8 DEVICE_TARGET=friendlyarm:nanopi-r5c CONFIG_FILE=.github/workflows/nanopi-r5c.config

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoPi-R5C-ImmortalWrt-${{ github.run_number }}
          path: |
            bin/targets/rockchip/armv8/*.img.gz
            bin/targets/rockchip/armv8/*-sysupgrade.bin
          retention-days: 7
