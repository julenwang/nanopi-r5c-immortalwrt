name: NanoPi-R5C ImmortalWrt Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 3,6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout device configs
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Install dependencies
        run: |
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'

      - name: Clone ImmortalWrt source
        run: |
          git clone --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }}

      - name: Prepare config
        run: |
          cd immortalwrt
          cp ../.github/workflows/nanopi-r5c.config .config
          cp ../.github/workflows/feeds-nanopi-r5c.conf feeds.conf.default

      - name: Copy custom files (LAN IP 172.31.31.205)
        run: |
          cd immortalwrt
          mkdir -p files/etc/config
          cp ../files/etc/config/network files/etc/config/network

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a

      - name: Install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds install -a

      - name: Expand configuration (make defconfig)
        run: |
          cd immortalwrt
          make defconfig

      - name: Download package source code
        run: |
          cd immortalwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build ImmortalWrt
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: NanoPi-R5C-ImmortalWrt-${{ github.run_number }}
          path: |
            immortalwrt/bin/targets/rockchip/armv8/*.img.gz
            immortalwrt/bin/targets/rockchip/armv8/*-sysupgrade.bin
          retention-days: 7
