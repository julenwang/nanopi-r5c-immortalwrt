name: NanoPi-R5C ImmortalWrt Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 3,6'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device configs
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Clone ImmortalWrt source
        run: |
          git clone --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }}

      - name: Prepare config
        run: |
          cd immortalwrt
          cp ../.github/workflows/nanopi-r5c.config .config
          cp ../.github/workflows/feeds-nanopi-r5c.conf feeds.conf.default

      - name: Copy custom files (LAN IP 192.168.2.1)
        run: |
          cd immortalwrt
          mkdir -p files/etc/config
          cp ../files/etc/config/network files/etc/config/network

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a

      - name: Install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds install -a

      - name: Build ImmortalWrt
        run: |
          cd immortalwrt
          make -j$(nproc) V=s


      - name: Process and Organize Files
        run: |
          mkdir -p ./artifact/
          # 1. 进入编译输出目录
          cd immortalwrt/bin/targets/rockchip/armv8/
          
          # 2. 打印当前目录列表，方便在 Action 日志里debug
          ls -lh
          
          # 3. 强制拷贝真实镜像文件（-L 解决软链接问题）
          # 我们只需要 ext4 或 squashfs 的 combined 镜像，这是刷机用的
          cp -L *combined.img.gz ../../../../artifact/ 2>/dev/null || true
          cp -L *sysupgrade.bin ../../../../artifact/ 2>/dev/null || true
          
          # 4. 同时拷贝配置文件，方便对比
          cp ../../../../immortalwrt/.config ../../../../artifact/config.buildinfo

      - name: Upload Artifact
        uses: actions/upload-artifact@v5
        with:
          name: NanoPi-R5C-ImmortalWrt-${{ github.run_number }}
          # 这里的路径必须指向我们刚才整理好的文件夹
          path: ./artifact/
