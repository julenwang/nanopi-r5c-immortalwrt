name: NanoPi-R5C ImmortalWrt Build

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 3,6'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout device configs
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pyelftools

      - name: Clone ImmortalWrt source
        run: |
          git clone --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }}

      - name: Prepare config
        run: |
          cd immortalwrt
          cp ../.github/workflows/nanopi-r5c.config .config
          cp ../.github/workflows/feeds-nanopi-r5c.conf feeds.conf.default

      - name: Update feeds
        run: |
          cd immortalwrt
          ./scripts/feeds update -a

      - name: Install feeds
        run: |
          cd immortalwrt
          ./scripts/feeds install -a

      - name: Patch default LAN IP to 192.168.2.1
        run: |
          cd immortalwrt
          sed -i 's/192\.168\.1\.1/192.168.2.1/g' target/linux/rockchip/armv8/base-files/etc/board.d/02_network
          grep -i "192.168" target/linux/rockchip/armv8/base-files/etc/board.d/02_network

      - name: Build ImmortalWrt
        run: |
          cd immortalwrt
          make -j$(nproc) V=s

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoPi-R5C-ImmortalWrt-${{ github.run_number }}
          path: |
            immortalwrt/bin/targets/rockchip/armv8/*.img.gz
            immortalwrt/bin/targets/rockchip/armv8/*-sysupgrade.bin
          retention-days: 7
