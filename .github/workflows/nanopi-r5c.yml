name: NanoPi-R5C ImmortalWrt Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build OpenWrt
        uses: openwrtofans/openwrt-actions@v1.3.0
        with:
          openwrt_version: 23.05
          target: rockchip/armv8
          profile: friendlyarm_nanopi-r5c
          config_file: nanopi-r5c.config
          feeds_config: feeds-nanopi-r5c.conf

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NanoPi-R5C-ImmortalWrt
          path: bin/targets/rockchip/armv8/
          retention-days: 7
